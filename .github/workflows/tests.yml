name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build distribution
        run: uv build

      - name: Verify wheel installs and imports
        run: |
          uv pip install --reinstall-package async-redis-client dist/*.whl
          uv run python -c "import async_redis_client; assert async_redis_client.__version__"

      - name: Run tests
        run: uv run pytest
