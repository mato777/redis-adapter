name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest
