diff_vs_redis:
  - no Fernet; plaintext in-memory
  - ttl_seconds accepted ignored
  - close no-op
  - set_model stores instance not encrypted bytes
  - wrong API on key type raises SerializationError not DecryptionError
collision_rules:
  - one storage kind per key; incr clears json/model on key
  - get on model key -> SerializationError use get_as_model
  - get on counter key -> SerializationError use incr
set_many|get_many: sequential per key; no cluster slot rules
