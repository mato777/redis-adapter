symbol: RedisPubSubSyncAdapter
kind: adapter
protocol: PubSubSyncPort
module: async_redis_client.adapters.redis.pubsub_sync_adapter
file: adapters/redis/pubsub_sync_adapter.py
import: from async_redis_client import RedisPubSubSyncAdapter
client: redis.Redis | redis.cluster.RedisCluster
init: {client, channel_prefix: "", owns_client: false}
factories: [from_standalone_url, from_cluster_url]
