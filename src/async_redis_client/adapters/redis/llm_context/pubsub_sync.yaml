physical_channel: channel_prefix + logical_channel  # _pubsub_helpers.full_channel
lifecycle:
  - close each subscription before adapter.close()
  - owns_client: with adapter or close() shuts down Redis
decode_responses: pass in from_url kwargs if you want str data on wire
memory_diff: Redis allows multi-channel subscribe; memory allows one
